name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/leayeh/jd-explorer

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}

  update-infra:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: LeaYeh/lyeh-infra
          token: ${{ secrets.LYEH_INFRA_PAT }}
          path: lyeh-infra

      - name: Bump image tag in lyeh-infra
        run: |
          IMAGE="${{ env.IMAGE }}:sha-${{ github.sha }}"
          sed -i "s|image: .*jd-explorer.*|image: $IMAGE|" \
            lyeh-infra/apps/jd-explorer/deployment.yaml
          cd lyeh-infra
          git config user.email "ci@lyeh.dev"
          git config user.name "CI Bot"
          git add apps/jd-explorer/deployment.yaml
          git commit -m "chore(jd-explorer): bump image to sha-${{ github.sha }}"
          git push
